name: Wochenplan Excel synchronisieren

on:
  push:
    branches: [main]
    paths:
      - "data/Telegram_Wochenplan_mfx555.xlsx"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install openpyxl

      - name: Excel in JSON umwandeln
        run: python regenerate_json.py

      - name: JSON committen (nur falls geändert)
        run: |
          if [ -n "$(git status --porcelain data/wochenplan.json)" ]; then
            git config user.name "telegram-wochenplan-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/wochenplan.json
            git commit -m "data: wochenplan.json aus Excel aktualisiert [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          else
            echo "Keine Änderungen an wochenplan.json."
          fi
